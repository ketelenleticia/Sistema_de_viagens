services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile

    ports:
      - "8080:80"

    volumes:
      - .:/var/www/html

  mysql:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sistema_viagens

    volumes:
      - dados_mysql:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

    ports:
      - "3307:3306"

  phpmyadmin:
    image: phpmyadmin:latest

    depends_on:
      - mysql

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306

    ports:
      - "8081:80"

volumes:
  dados_mysql:
