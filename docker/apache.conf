<VirtualHost *:80>

    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    <Directory /var/www/html/docker>
        Require all denied
    </Directory>

    <Directory /var/www/html/config>
        Require all denied
    </Directory>

</VirtualHost>